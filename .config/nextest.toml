# cargo-nextest configuration.
#
# Run tests with `cargo nextest run --workspace`. Each test gets its own
# process, which matters here beyond speed: the GPU tests each build a wgpu
# device, and process isolation means one wedged device cannot take the suite
# with it.

[profile.default]
# Surface slow tests rather than letting them hide. GPU tests legitimately take
# seconds; anything past the terminate bound is wedged, not slow.
slow-timeout = { period = "30s", terminate-after = 8 }
# A panicking GPU test says nothing useful about the ones after it.
fail-fast = false
failure-output = "immediate-final"
status-level = "fail"
final-status-level = "slow"

[profile.ci]
slow-timeout = { period = "60s", terminate-after = 6 }
fail-fast = false
failure-output = "immediate-final"
status-level = "all"

# GPU tests share one physical device. Running many at once thrashes it and
# turns real failures into timeouts, so they are serialised.
[test-groups]
gpu = { max-threads = 1 }

[[profile.default.overrides]]
filter = 'package(gs-kernels) or package(gs-map) or package(gs-wgpu) or package(gs-track)'
test-group = 'gpu'
